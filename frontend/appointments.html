<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body onload="initAppointments()">

<div id="loader" class="loader"><div class="spinner"></div></div>
<div id="toast" class="toast-box"></div>

<div class="container">

<h2>Appointments</h2>

<label for="patientId">Patient ID</label>
<input id="patientId" class="form-control mb-2" placeholder="Enter Patient ID">

<label for="doctorId">Doctor ID</label>
<input id="doctorId" class="form-control mb-2" placeholder="Enter Doctor ID">

<label for="date">Date</label>
<input id="date" type="date" class="form-control mb-2">

<button class="btn btn-primary" onclick="bookAppointment()">Book</button>

<label for="sortSelect" class="mt-3">Sort Appointments</label>
<select id="sortSelect" class="form-select w-auto mb-3" onchange="sortAppointments()">
<option value="">Select</option>
<option value="date">Date</option>
<option value="doctor">Doctor</option>
</select>

<div id="appointmentList"></div>

</div>

<script src="js/app.js"></script>
</body>
</html>
