<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body onload="initDashboard()">

<div id="loader" class="loader"><div class="spinner"></div></div>
<div id="toast" class="toast-box"></div>

<div class="d-flex">

<!-- SIDEBAR -->
<div class="sidebar p-3">
<h4 class="text-white text-center">Hospital</h4>

<ul class="nav flex-column mt-4">
<li><a href="dashboard.html" class="nav-link text-white">Dashboard</a></li>
<li><a href="doctors.html" class="nav-link text-white">Doctors</a></li>
<li><a href="appointments.html" class="nav-link text-white">Appointments</a></li>

<li>
<button onclick="logout()" class="nav-link text-white btn w-100 text-start">
Logout
</button>
</li>
</ul>
</div>

<!-- CONTENT -->
<div class="content p-4 w-100">

<h2>Dashboard</h2>

<div class="row g-3">

<div class="col-md-4 admin-only">
<div class="card text-center p-3 shadow">
<h5>Total Users</h5>
<h3 id="usersCount">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card text-center p-3 shadow clickable"
role="button"
tabindex="0"
onclick="showDoctors()"
onkeydown="if(event.key==='Enter'){showDoctors();}">
<h5>Total Doctors</h5>
<h3 id="doctorsCount">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card text-center p-3 shadow">
<h5>Total Appointments</h5>
<h3 id="appointmentsCount">0</h3>
</div>
</div>

</div>

<div id="doctorList" class="mt-3"></div>

</div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
